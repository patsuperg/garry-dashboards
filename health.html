<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="refresh" content="300">
<title>Health · Patrick</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--surface:#0d0d12;--surface2:#111116;--border:#1c1c24;
  --text:#f0f0f2;--sub:#9090a0;--dim:#545464;
  --green:#34d399;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
  --red:#f87171;--yellow:#fbbf24
}
body{
  background:var(--bg);color:var(--text);
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;
  padding:max(env(safe-area-inset-top),16px) 18px 56px
}
.wrap{max-width:560px;margin:0 auto}

/* ── PHASE HERO ── */
.phase-hero{
  background:linear-gradient(135deg,rgba(52,211,153,0.07) 0%,rgba(96,165,250,0.04) 100%);
  border:1px solid rgba(52,211,153,0.2);border-radius:20px;padding:22px 22px 18px;
  margin-bottom:20px
}
.phase-label{font-size:9px;letter-spacing:3.5px;color:var(--green);font-weight:700;text-transform:uppercase}
.phase-title{font-size:26px;font-weight:900;margin-top:5px;letter-spacing:-0.5px}
.phase-meta{display:flex;margin-top:16px;border-top:1px solid rgba(255,255,255,0.05);padding-top:14px;gap:0}
.phase-m{flex:1;padding:0 14px;border-right:1px solid var(--border)}
.phase-m:first-child{padding-left:0}
.phase-m:last-child{border-right:none}
.phase-m-v{font-size:21px;font-weight:800}
.phase-m-l{font-size:8.5px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-top:3px}
.phase-goal{font-size:12px;color:var(--sub);margin-top:14px;line-height:1.5}

/* ── RINGS ── */
.rings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.ring-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:20px 16px 18px;display:flex;flex-direction:column;align-items:center
}
.ring-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:14px}
.ring-wrap{position:relative;width:116px;height:116px}
.ring-wrap svg{display:block;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:#1a1a24;stroke-width:11}
.ring-fill{fill:none;stroke-width:11;stroke-linecap:round;stroke-dashoffset:276.46}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;line-height:1
}
.ring-val{font-size:24px;font-weight:900;letter-spacing:-0.5px}
.ring-unit{font-size:11px;color:var(--dim);font-weight:400;margin-top:1px}
.ring-sub{font-size:10px;color:var(--sub);margin-top:12px;text-align:center;line-height:1.45;min-height:30px}

/* ── SPOONS ── */
.spoons-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:22px 20px 20px;margin-bottom:20px
}
.card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.card-title{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700}
.card-date{font-size:10px;color:var(--dim)}
.spoons-big{font-size:68px;font-weight:900;letter-spacing:-2px;line-height:1}
.spoons-big span{font-size:26px;color:#2a2a36;font-weight:500}
.spoons-lbl{font-size:12px;font-weight:600;margin-top:4px;margin-bottom:16px}
.spoons-icons{font-size:19px;letter-spacing:5px;line-height:1.4;margin-bottom:18px}
.trend-row{display:flex;align-items:flex-end;gap:4px;justify-content:center}
.tbar{border-radius:3px 3px 0 0;min-height:4px}
.tbar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.tbar-d{font-size:7.5px;color:var(--dim)}

/* ── SLEEP BREAKDOWN ── */
.sleep-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:20px
}
.sec-title{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:16px}
.stages{display:flex;gap:0}
.stage{flex:1;text-align:center;border-right:1px solid var(--border);padding:0 8px}
.stage:first-child{padding-left:0}
.stage:last-child{border-right:none}
.stage-v{font-size:22px;font-weight:800}
.stage-l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;margin-top:4px}
.stage-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.stage-fill{height:100%;border-radius:2px;transition:width 1s ease}

/* ── VITALS PAIR ── */
.vitals-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.vital-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;text-align:center}
.vital-lbl{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:10px}
.vital-val{font-size:38px;font-weight:900;letter-spacing:-1px;line-height:1}
.vital-unit{font-size:13px;color:var(--dim);font-weight:400;margin-left:2px}
.vital-baseline{font-size:10px;color:var(--sub);margin-top:8px}

/* ── HISTORY HEAT ── */
.history-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:20px
}
.hist-grid{display:grid;gap:4px}
.hist-row{display:flex;align-items:center;gap:4px}
.hist-row-label{font-size:8px;color:var(--dim);width:32px;text-align:right;flex-shrink:0}
.hist-cells{display:flex;gap:4px;flex:1}
.hist-cell{flex:1;height:18px;border-radius:4px;min-width:0}
.hist-dates{display:flex;gap:4px;margin-top:4px;margin-left:36px}
.hist-date{flex:1;font-size:7px;color:var(--dim);text-align:center}
.hist-legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── DOSING ── */
.dosing{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.dose{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
.dose-left{}
.dose-name{font-size:13px;font-weight:700}
.dose-freq{font-size:10px;color:var(--dim);margin-top:4px}
.dose-tag{font-size:8.5px;background:#0a0a10;border:1px solid var(--border);padding:4px 10px;border-radius:8px;letter-spacing:0.5px;color:var(--sub)}

/* ── BOTTOM PAIR ── */
.bottom-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.bot-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px}
.bot-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.bot-val{font-size:30px;font-weight:900;line-height:1}
.bot-sub{font-size:11px;color:var(--sub);margin-top:5px}
.rehab-bar{height:5px;background:var(--border);border-radius:3px;margin-top:12px;overflow:hidden}
.rehab-fill{height:100%;border-radius:3px;background:var(--blue)}

/* ── FOOTER ── */
.foot{text-align:center;font-size:10px;color:var(--dim);line-height:1.8;letter-spacing:0.5px}

@media(max-width:380px){
  .stages{gap:4px}
  .ring-val{font-size:20px}
  .spoons-big{font-size:54px}
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="foot" style="margin-top:60px;font-size:14px">Syncing…</div>
</div>

<script>
const R = 47;
const C = +(2 * Math.PI * R).toFixed(2); // 295.31

function offset(pct) {
  return +(C - C * Math.min(Math.max(pct, 0), 100) / 100).toFixed(2);
}

function ringColor(key, val) {
  if (key === 'sleep')    return '#60a5fa';
  if (key === 'recovery') return val >= 66 ? '#34d399' : val >= 33 ? '#fbbf24' : '#f87171';
  if (key === 'strain')   return '#a78bfa';
  if (key === 'stress')   return val <= 30 ? '#34d399' : val <= 60 ? '#fbbf24' : '#f87171';
  return '#60a5fa';
}

function spoonsColor(n, max) {
  const r = n / max;
  return r >= 0.75 ? '#34d399' : r >= 0.5 ? '#fbbf24' : '#f87171';
}

function histColor(type, val) {
  if (type === 'spoon') return val >= 8 ? '#34d399' : val >= 5 ? '#fbbf24' : '#f87171';
  if (type === 'sleep')  return val >= 7 ? '#60a5fa' : val >= 5.5 ? '#fbbf24' : '#f87171';
  if (type === 'hrv')    return val >= 35 ? '#34d399' : val >= 18 ? '#fbbf24' : '#f87171';
  return '#1c1c24';
}

function dayLabel(dateStr) {
  return ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(dateStr + 'T12:00:00').getDay()];
}

function buildRing(key, label, ringData) {
  const raw   = ringData.value ?? 0;
  const pct   = key === 'strain' ? Math.min((raw / 21) * 100, 100) : raw;
  const color = ringColor(key, pct);
  const fin   = offset(pct);

  let valStr, unitStr;
  if (key === 'sleep') {
    valStr  = ringData.label ?? `${raw}%`;
    unitStr = '';
  } else if (key === 'strain') {
    valStr  = raw === 0 ? '—' : raw.toFixed(1);
    unitStr = raw === 0 ? '' : '/21';
  } else {
    valStr  = raw === 0 && key === 'stress' ? '—' : Math.round(raw);
    unitStr = raw === 0 && key === 'stress' ? '' : '%';
  }

  const sub = (ringData.subtitle ?? '').replace('—','–');

  return `
<div class="ring-card">
  <div class="ring-label">${label}</div>
  <div class="ring-wrap">
    <svg width="116" height="116" viewBox="0 0 116 116">
      <circle class="ring-track" cx="58" cy="58" r="${R}"/>
      <circle class="ring-fill" cx="58" cy="58" r="${R}"
        stroke="${color}"
        stroke-dasharray="${C}"
        stroke-dashoffset="${C}"
        data-fin="${fin}"
        id="r-${key}"/>
    </svg>
    <div class="ring-center">
      <div class="ring-val" style="color:${color}">${valStr}</div>
      <div class="ring-unit">${unitStr}</div>
    </div>
  </div>
  <div class="ring-sub">${sub}</div>
</div>`;
}

function render(data) {
  const today   = data.today   ?? {};
  const history = data.history ?? [];
  const rings   = today.rings  ?? {};
  const sb      = today.sleep_breakdown ?? {};
  const base    = today.baseline_14d    ?? {};

  // Spoons
  const sn    = today.spoons     ?? 0;
  const smax  = today.spoons_max ?? 12;
  const slbl  = today.spoons_label ?? '';
  const sclr  = spoonsColor(sn, smax);
  const spoonsIcons = '🥄'.repeat(sn) + `<span style="opacity:0.12">${'🥄'.repeat(smax - sn)}</span>`;

  // Trend — last 7
  const last7  = history.slice(-7);
  const tBars  = last7.map(h => {
    const sp  = h.spoons ?? 0;
    const ht  = Math.max(4, Math.round((sp / 12) * 44));
    const clr = spoonsColor(sp, 12);
    const d   = (h.date ?? '').slice(5);
    return `<div class="tbar-wrap">
      <div class="tbar" style="width:20px;height:${ht}px;background:${clr}" title="${h.date} · ${sp}/12"></div>
      <div class="tbar-d">${d}</div>
    </div>`;
  }).join('');

  // Sleep stages
  const tot   = sb.total_hr || 1;
  const deepP = +((sb.deep_hr  || 0) / tot * 100).toFixed(0);
  const remP  = +((sb.rem_hr   || 0) / tot * 100).toFixed(0);
  const coreP = +((sb.core_hr  || 0) / tot * 100).toFixed(0);

  const stg = (val, lbl, pct, clr) => `
<div class="stage">
  <div class="stage-v" style="color:${clr}">${(val||0).toFixed(1)}<span style="font-size:11px;color:var(--dim);font-weight:400">h</span></div>
  <div class="stage-l">${lbl}</div>
  <div class="stage-bar"><div class="stage-fill" style="width:${pct}%;background:${clr}"></div></div>
</div>`;

  // History heatmap — last 14
  const last14 = history.slice(-14);
  const histDates = last14.map(h =>
    `<div class="hist-date">${dayLabel(h.date ?? '')}</div>`
  ).join('');

  const hRow = (label, type, fn) => `
<div class="hist-row">
  <div class="hist-row-label">${label}</div>
  <div class="hist-cells">${last14.map(h =>
    `<div class="hist-cell" style="background:${histColor(type, fn(h))}" title="${h.date}: ${fn(h)}"></div>`
  ).join('')}</div>
</div>`;

  // Phase calc
  const now        = new Date();
  const cycleStart = new Date('2026-05-08');
  const bloodsDate = new Date('2026-07-15');
  const wk         = Math.floor((now - cycleStart) / 86400000 / 7) + 1;
  const dBlood     = Math.ceil((bloodsDate - now) / 86400000);

  // HRV / RHR colors — compare to baseline
  const hrv     = today.hrv_overnight ?? 0;
  const rhr     = today.rhr_overnight ?? 0;
  const b_hrv   = base.hrv ?? 0;
  const b_rhr   = base.rhr ?? 0;
  const hrvClr  = hrv >= b_hrv * 1.1 ? '#34d399' : hrv >= b_hrv * 0.85 ? '#60a5fa' : '#f87171';
  const rhrClr  = rhr <= b_rhr * 0.95 ? '#34d399' : rhr <= b_rhr * 1.05 ? '#60a5fa' : '#f87171';

  // Generated timestamp
  const gen = data.generated
    ? new Date(data.generated).toLocaleString('en-AU',
        {timeZone:'Australia/Melbourne',hour:'numeric',minute:'2-digit',month:'short',day:'numeric'})
    : '';

  document.getElementById('app').innerHTML = `
<!-- PHASE HERO -->
<div class="phase-hero">
  <div class="phase-label">Current Phase</div>
  <div class="phase-title">BUILD PHASE</div>
  <div class="phase-meta">
    <div class="phase-m">
      <div class="phase-m-v">Wk ${wk}</div>
      <div class="phase-m-l">Protocol</div>
    </div>
    <div class="phase-m">
      <div class="phase-m-v">${dBlood}d</div>
      <div class="phase-m-l">Next Bloods</div>
    </div>
    <div class="phase-m">
      <div class="phase-m-v">Wk 14</div>
      <div class="phase-m-l">Elbow Rehab</div>
    </div>
  </div>
  <div class="phase-goal">→ Max volume · 3,200+ kcal · 280g protein</div>
</div>

<!-- RINGS -->
<div class="rings">
  ${buildRing('sleep',    'Sleep',    rings.sleep    ?? {value:0})}
  ${buildRing('recovery', 'Recovery', rings.recovery ?? {value:0})}
  ${buildRing('strain',   'Strain',   rings.strain   ?? {value:0})}
  ${buildRing('stress',   'Stress',   rings.stress   ?? {value:0})}
</div>

<!-- SPOONS -->
<div class="spoons-card">
  <div class="card-header">
    <div class="card-title">Energy Today</div>
    <div class="card-date">${today.date ?? ''}</div>
  </div>
  <div class="spoons-big" style="color:${sclr}">${sn}<span>/${smax}</span></div>
  <div class="spoons-lbl" style="color:${sclr}">${slbl}</div>
  <div class="spoons-icons">${spoonsIcons}</div>
  <div class="trend-row">${tBars}</div>
</div>

<!-- SLEEP BREAKDOWN -->
<div class="sleep-card">
  <div class="sec-title">Sleep Breakdown</div>
  <div class="stages">
    ${stg(sb.deep_hr,  'Deep',  deepP, '#60a5fa')}
    ${stg(sb.rem_hr,   'REM',   remP,  '#a78bfa')}
    ${stg(sb.core_hr,  'Core',  coreP, 'var(--sub)')}
    ${stg(sb.total_hr, 'Total', 100,   '#34d399')}
  </div>
</div>

<!-- HRV + RHR -->
<div class="vitals-pair">
  <div class="vital-card">
    <div class="vital-lbl">HRV</div>
    <div class="vital-val" style="color:${hrvClr}">${hrv.toFixed(0)}<span class="vital-unit">ms</span></div>
    <div class="vital-baseline">7d avg ${b_hrv ? b_hrv.toFixed(1) : '—'} ms</div>
  </div>
  <div class="vital-card">
    <div class="vital-lbl">Resting HR</div>
    <div class="vital-val" style="color:${rhrClr}">${rhr.toFixed(0)}<span class="vital-unit">bpm</span></div>
    <div class="vital-baseline">7d avg ${b_rhr ? b_rhr.toFixed(1) : '—'} bpm</div>
  </div>
</div>

<!-- 14-DAY HISTORY -->
<div class="history-card">
  <div class="sec-title">14-Day History</div>
  <div class="hist-grid">
    ${hRow('Spoons', 'spoon', h => h.spoons  ?? 0)}
    ${hRow('Sleep',  'sleep', h => h.sleep_hr ?? 0)}
    ${hRow('HRV',    'hrv',   h => h.hrv      ?? 0)}
  </div>
  <div class="hist-dates">${histDates}</div>
  <div class="hist-legend">
    <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>Good</div>
    <div class="leg-item"><div class="leg-dot" style="background:#fbbf24"></div>Mid</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f87171"></div>Low</div>
    <div class="leg-item"><div class="leg-dot" style="background:#60a5fa"></div>Sleep</div>
  </div>
</div>

<!-- PROTOCOL DOSING -->
<div class="sec-title" style="margin-bottom:12px">Protocol · Build</div>
<div class="dosing">
  <div class="dose">
    <div class="dose-left">
      <div class="dose-name" style="color:#34d399">Test E — 250mg IM</div>
      <div class="dose-freq">Thu · Mon split · from May 8</div>
    </div>
    <div class="dose-tag">FOUNDATION</div>
  </div>
  <div class="dose">
    <div class="dose-left">
      <div class="dose-name" style="color:#34d399">Deca — 200mg IM</div>
      <div class="dose-freq">Thu · Mon split · from May 8</div>
    </div>
    <div class="dose-tag">BUILD</div>
  </div>
  <div class="dose">
    <div class="dose-left">
      <div class="dose-name" style="color:#60a5fa">BPC-157 / TB-500 — 250µg / 2.5mg</div>
      <div class="dose-freq">Daily / 2× wk · Elbow rehab</div>
    </div>
    <div class="dose-tag">REHAB</div>
  </div>
</div>

<!-- NEXT BLOODS + REHAB -->
<div class="bottom-pair">
  <div class="bot-card">
    <div class="bot-lbl">Next Panel</div>
    <div class="bot-val" style="color:var(--blue)">${dBlood}d</div>
    <div class="bot-sub">Jul 15 · Aussie Scripts $45</div>
  </div>
  <div class="bot-card">
    <div class="bot-lbl">Elbow Rehab</div>
    <div class="bot-val" style="color:var(--blue)">Wk 14</div>
    <div class="bot-sub">Pain-free pressing ✓</div>
    <div class="rehab-bar"><div class="rehab-fill" style="width:100%"></div></div>
  </div>
</div>

<div class="foot">
  Synced ${gen} AEST · Eight Sleep + Apple Health + Aura Ring<br>
  <em>The income is me.</em>
</div>`;

  // Animate rings in
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.ring-fill').forEach(el => {
      const fin = el.getAttribute('data-fin');
      el.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(0.34,1.06,0.64,1)';
      el.style.strokeDashoffset = fin;
    });
  }));
}

fetch('./health-data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="foot" style="margin-top:80px;color:var(--red)">
        ⚠ Failed to load health data<br><small style="opacity:0.6">${err.message}</small>
      </div>`;
  });
</script>
</body>
</html>
