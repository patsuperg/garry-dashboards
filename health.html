<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Health · Patrick</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#f0f0f2;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:env(safe-area-inset-top) 20px 48px}
.wrap{max-width:540px;margin:0 auto}
.hdr{text-align:center;padding:24px 0 4px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#5a5a64}

/* SPOONS */
.spoons{text-align:center;padding:28px 0 20px}
.spoons-date{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:14px}
.spoons-num{font-size:88px;font-weight:900;line-height:1;letter-spacing:-3px}
.spoons-max{font-size:28px;color:#444;font-weight:400}
.spoons-icons{font-size:22px;letter-spacing:3px;margin:16px 0 8px}
.spoons-label{font-size:12px;margin-top:4px}

.divider{height:1px;background:linear-gradient(90deg,transparent,#1a1a20,transparent);margin:4px 0 24px}

/* 4 RING DIALS */
.rings{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ring-card{background:#0c0c10;border:1px solid #18181c;border-radius:18px;padding:20px 14px;text-align:center}
.ring-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#666;margin-bottom:12px}
.ring-wrap{position:relative;display:inline-block}
svg.rdial{transform:rotate(-90deg);overflow:visible}
.ring-bg{fill:none;stroke:#1a1a20}
.ring-fg{fill:none;stroke-linecap:round}
.ring-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.ring-val{font-size:22px;font-weight:800;line-height:1}
.ring-unit{font-size:10px;color:#666;margin-top:1px}
.ring-sub{font-size:10px;color:#555;margin-top:8px;line-height:1.5;min-height:28px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:#0c0c10;border:1px solid #18181c;border-radius:13px;padding:14px 8px;text-align:center}
.stat-l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#666;margin-bottom:7px}
.stat-v{font-size:22px;font-weight:800;line-height:1}
.stat-u{font-size:10px;color:#555;margin-left:1px;font-weight:400}

/* COACHING */
.coaching{background:#0c0c10;border:1px solid #18181c;border-radius:14px;padding:16px 18px;margin-bottom:16px}
.coaching-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5a64;margin-bottom:7px}
.coaching-txt{font-size:13px;color:#b0b0b8;line-height:1.65}

/* TREND */
.trend{margin-bottom:20px}
.trend-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5a64;margin-bottom:10px}
.bars{display:flex;align-items:flex-end;gap:5px;height:46px}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:4px}
.dates{display:flex;gap:5px;margin-top:5px}
.dt{flex:1;font-size:8px;color:#3a3a42;text-align:center}

/* FOOT */
.foot{text-align:center;font-size:10px;color:#2a2a30;padding:20px 0 8px;line-height:1.9;letter-spacing:0.5px}
.foot em{color:#222}

/* Loading */
.loading{text-align:center;padding:80px 0;color:#333;font-size:13px;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">Health</div>
<div class="loading" id="loading">Loading…</div>
<div id="root" style="display:none"></div>
</div>

<script>
const C_R=46,C_CX=54,C_CY=54,C_SW=10;
const CIRC=2*Math.PI*C_R;

function ringDial(pct,color,valStr,unitStr,subStr,label){
  const off=(CIRC*(1-Math.min(1,Math.max(0,pct)/100))).toFixed(2);
  return`<div class="ring-card">
  <div class="ring-lbl">${label}</div>
  <div class="ring-wrap">
    <svg class="rdial" width="${C_CX*2}" height="${C_CY*2}" viewBox="0 0 ${C_CX*2} ${C_CY*2}">
      <circle class="ring-bg" cx="${C_CX}" cy="${C_CY}" r="${C_R}" stroke-width="${C_SW}"/>
      <circle class="ring-fg" cx="${C_CX}" cy="${C_CY}" r="${C_R}" stroke="${color}" stroke-width="${C_SW}"
        stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-val" style="color:${color}">${valStr}</div>
      <div class="ring-unit">${unitStr}</div>
    </div>
  </div>
  <div class="ring-sub">${subStr}</div>
</div>`;
}

function spColor(n){return n>=8?'#34d399':n>=5?'#fbbf24':'#f87171'}
function hvColor(v){return v>=40?'#34d399':v>=28?'#fbbf24':'#f87171'}
function rhrColor(v){return v<=65?'#34d399':v<=75?'#fbbf24':'#f87171'}
function stColor(v){return v>=8000?'#34d399':v>=4000?'#fbbf24':'#f87171'}
function recColor(v){return v>=67?'#34d399':v>=34?'#fbbf24':'#f87171'}
function slColor(v){return v>=75?'#3B82F6':v>=55?'#60a5fa':'#f87171'}
function stressColor(v){return v<=30?'#34d399':v<=60?'#fbbf24':'#f87171'}

async function render(){
  let d;
  try{
    const res=await fetch('./health-data.json?_='+Date.now());
    d=await res.json();
  }catch(e){
    document.getElementById('loading').innerHTML='<span style="color:#f87171">Failed to load data.</span>';
    return;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('root').style.display='block';

  const td=d.today||{};
  const rings=td.rings||{};
  const sl=rings.sleep||{};
  const rc=rings.recovery||{};
  const st=rings.strain||{};
  const sx=rings.stress||{};
  const bd=td.sleep_breakdown||{};
  const hist=d.history||[];

  const spn=td.spoons||0;
  const spMax=td.spoons_max||12;
  const spLbl=(td.spoons_label||'').toUpperCase();
  const sc=spColor(spn);
  const icons='🥄'.repeat(spn)+('·'.repeat(Math.max(0,spMax-spn)));

  const dateStr=td.date||'';
  let niceDt=dateStr;
  try{const dt=new Date(dateStr+'T12:00:00');niceDt=dt.toLocaleDateString('en-AU',{weekday:'long',month:'long',day:'numeric'})}catch(e){}

  const hrv=td.hrv_overnight||0;
  const rhr=td.rhr_overnight||0;
  const stRaw=st.raw||{};
  const steps=stRaw.steps||0;
  const kcal=stRaw.kcal||0;

  // Sleep ring
  const slPct=sl.value||0;
  const slHr=parseFloat(sl.raw_hr||bd.total_hr||0).toFixed(1);
  const slSub=`${parseFloat(bd.deep_hr||0).toFixed(1)}h deep · ${parseFloat(bd.rem_hr||0).toFixed(1)}h REM`;

  // Recovery
  const rcPct=rc.value||0;
  const rcSub=`HRV ${hrv}ms · RHR ${rhr}bpm`;

  // Strain (% of 21 max)
  const stVal=parseFloat(st.value||0);
  const stPct=Math.round((stVal/21)*100);
  const stSub=`${kcal}kcal · ${steps.toLocaleString()} steps`;

  // Stress
  const sxPct=sx.value||0;
  const sxSub=sx.subtitle||'';

  // Trend
  const recent=hist.slice(-7);
  let barsH='',dtH='';
  if(recent.length){
    barsH='<div class="bars">'+recent.map(h=>{
      const s=h.spoons||0;
      const ht=Math.max(4,(s/12*44)).toFixed(0);
      const c=spColor(s);
      return`<div class="bar" style="height:${ht}px;background:${c}" title="${h.date}: ${s}/12"></div>`;
    }).join('')+'</div>';
    dtH='<div class="dates">'+recent.map(h=>{
      try{const dt=new Date(h.date+'T12:00:00');return`<div class="dt">${dt.toLocaleDateString('en-AU',{weekday:'short'}).slice(0,2)}</div>`}
      catch(e){return'<div class="dt"></div>'}
    }).join('')+'</div>';
  }

  const gen=d.generated?new Date(d.generated):null;
  const updStr=gen?gen.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}):'—';
  const coaching=d.coaching||'';

  document.getElementById('root').innerHTML=`
<div class="spoons">
  <div class="spoons-date">${niceDt}</div>
  <div class="spoons-num" style="color:${sc}">${spn}<span class="spoons-max">/12</span></div>
  <div class="spoons-icons">${icons}</div>
  <div class="spoons-label" style="color:${sc}">● ${spLbl}</div>
</div>

<div class="divider"></div>

<div class="rings">
  ${ringDial(slPct,slColor(slPct),slHr,'hrs',slSub,'Sleep')}
  ${ringDial(rcPct,recColor(rcPct),rcPct,'%',rcSub,'Recovery')}
  ${ringDial(stPct,'#A855F7',stVal.toFixed(1),'/21',stSub,'Strain')}
  ${ringDial(sxPct,stressColor(sxPct),sxPct,'%',sxSub||'—','Stress')}
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-l">HRV</div>
    <div class="stat-v" style="color:${hvColor(hrv)}">${hrv||'—'}<span class="stat-u">ms</span></div>
  </div>
  <div class="stat">
    <div class="stat-l">Resting HR</div>
    <div class="stat-v" style="color:${rhrColor(rhr)}">${rhr||'—'}<span class="stat-u">bpm</span></div>
  </div>
  <div class="stat">
    <div class="stat-l">Steps</div>
    <div class="stat-v" style="color:${stColor(steps)}">${steps?(steps).toLocaleString():'—'}</div>
  </div>
</div>

${coaching?`<div class="coaching"><div class="coaching-lbl">Coach</div><div class="coaching-txt">${coaching}</div></div>`:''}

${recent.length?`<div class="trend"><div class="trend-lbl">7-Day Spoons</div>${barsH}${dtH}</div>`:''}

<div class="foot">
  Updated ${updStr} · Eight Sleep + Apple Watch<br>
  <em>The income is me.</em>
</div>
`;
}

render();
setInterval(render,5*60*1000);
</script>
</body>
</html>
