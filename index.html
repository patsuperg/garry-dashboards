<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garry Command Centre</title>
<meta http-equiv="refresh" content="300">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; }
.top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #1a1a1a; }
.top-bar h1 { font-size: 1.4rem; color: #fff; letter-spacing: -0.5px; }
.last-updated { color: #555; font-size: 0.75rem; text-align: right; }
.last-updated span { color: #00d4aa; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid #222; padding: 0 24px; background: #0d0d0d; }
.tab { padding: 12px 24px; cursor: pointer; color: #666; font-size: 0.9rem; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #aaa; }
.tab.active { color: #00d4aa; border-bottom-color: #00d4aa; }

/* Content */
.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }

/* Cards */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #141414; border: 1px solid #222; border-radius: 14px; padding: 20px; }
.card .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
.card .lbl { font-size: 0.78rem; color: #888; margin-top: 6px; }
h2 { font-size: 1.1rem; color: #fff; margin-bottom: 14px; font-weight: 600; }
.section { margin-bottom: 28px; }
.green { color: #00d4aa; } .red { color: #e74c3c; } .yellow { color: #f39c12; } .white { color: #fff; } .blue { color: #3498db; }

/* Progress bar */
.progress-bar { height: 10px; background: #1a1a1a; border-radius: 5px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #00d4aa, #00b894); transition: width 0.5s; }

/* Property table */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #222; }
td { padding: 10px 12px; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; }
tr:hover { background: #141414; }

/* Health metrics */
.health-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.metric { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 16px; text-align: center; }
.metric .val { font-size: 1.8rem; font-weight: 700; }
.metric .unit { font-size: 0.7rem; color: #666; }
.metric .label { font-size: 0.75rem; color: #888; margin-top: 4px; }

/* Spoons */
.spoons-bar { display: flex; gap: 4px; margin-top: 8px; }
.spoon { width: 28px; height: 28px; border-radius: 50%; background: #1a1a1a; border: 1px solid #333; }
.spoon.filled { background: #00d4aa; border-color: #00d4aa; }
.spoon.half { background: linear-gradient(90deg, #f39c12 50%, #1a1a1a 50%); border-color: #f39c12; }

/* Badge */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
.badge-green { background: rgba(0,212,170,0.15); color: #00d4aa; }
.badge-red { background: rgba(231,76,60,0.15); color: #e74c3c; }
.badge-yellow { background: rgba(243,156,18,0.15); color: #f39c12; }

/* Actions */
.action-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #141414; border: 1px solid #222; border-radius: 10px; margin-bottom: 8px; }
.action-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.action-text { font-size: 0.85rem; }
.action-tag { font-size: 0.7rem; color: #666; margin-left: auto; }

/* Loading */
.loading { text-align: center; padding: 40px; color: #555; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>GARRY</h1>
  <div class="last-updated">Last updated<br><span id="last-update">loading...</span></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('command')">Command Centre</div>
  <div class="tab" onclick="switchTab('health')">Health</div>
  <div class="tab" onclick="switchTab('system')">System</div>
</div>

<!-- COMMAND CENTRE TAB -->
<div id="tab-command" class="tab-content active">
  <div class="grid" id="portfolio-cards"></div>

  <div class="section">
    <h2>Properties</h2>
    <table id="property-table">
      <thead><tr><th>Address</th><th>Status</th><th>Gross</th><th>Net</th><th>PM</th><th>Notes</th></tr></thead>
      <tbody id="property-rows"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>HAP Status — <span id="hap-month"></span></h2>
    <table id="hap-table">
      <thead><tr><th>Property</th><th>Expected</th><th>Received</th><th>Status</th></tr></thead>
      <tbody id="hap-rows"></tbody>
    </table>
  </div>
</div>

<!-- HEALTH TAB -->
<div id="tab-health" class="tab-content">
  <div class="section">
    <h2>Spoons Score</h2>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <span id="spoons-num" class="num" style="font-size:3rem;font-weight:700"></span>
      <span style="color:#888;font-size:1rem">/12</span>
      <span id="spoons-badge" class="badge"></span>
    </div>
    <div class="spoons-bar" id="spoons-bar"></div>
  </div>

  <div class="section">
    <h2>Today</h2>
    <div class="health-grid" id="health-today"></div>
  </div>

  <div class="section">
    <h2>Weekly Averages</h2>
    <div class="health-grid" id="health-weekly"></div>
  </div>

  <div class="section">
    <h2>Nutrition</h2>
    <div class="health-grid" id="health-nutrition"></div>
  </div>
</div>

<!-- SYSTEM TAB -->
<div id="tab-system" class="tab-content">
  <div class="grid" id="system-cards"></div>
  <div class="section">
    <h2>Architecture</h2>
    <div id="system-info" style="font-size:0.85rem;color:#aaa;line-height:1.8"></div>
  </div>
</div>

<script>
// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`#tab-${name}`).classList.add('active');
  event.target.classList.add('active');
}

// Helpers
const fmt = n => n != null ? '$' + n.toLocaleString() : '—';
const fmtAud = n => n != null ? 'A$' + Math.round(n * 1.58).toLocaleString() : '—';
const pct = n => n != null ? n.toFixed(1) + '%' : '—';
const timeAgo = iso => {
  if (!iso) return 'unknown';
  const d = new Date(iso);
  const mins = Math.round((Date.now() - d) / 60000);
  if (mins < 60) return mins + 'm ago';
  if (mins < 1440) return Math.round(mins/60) + 'h ago';
  return Math.round(mins/1440) + 'd ago';
};
const card = (num, label, color='white') => `<div class="card"><div class="num ${color}">${num}</div><div class="lbl">${label}</div></div>`;

// Load all data
async function loadAll() {
  try {
    const [portfolio, hap, health, system] = await Promise.all([
      fetch('data/portfolio-v2.json').then(r => r.json()).catch(() => null),
      fetch('data/hap-payments.json').then(r => r.json()).catch(() => null),
      fetch('data/health-summary.json').then(r => r.json()).catch(() => null),
      fetch('data/system-health.json').then(r => r.json()).catch(() => null),
    ]);

    // Update timestamp
    const latest = [portfolio?.updated, health?.updated, system?.updated].filter(Boolean).sort().pop();
    document.getElementById('last-update').textContent = latest ? new Date(latest).toLocaleString('en-AU', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'unknown';

    // COMMAND CENTRE
    if (portfolio) {
      const t = portfolio.totals;
      const audNet = Math.round(t.net_monthly * 1.58);
      document.getElementById('portfolio-cards').innerHTML =
        card(fmtAud(t.net_monthly), 'Net Monthly (AUD)', 'green') +
        card(fmt(t.net_monthly), 'Net Monthly (USD)', 'white') +
        card(t.property_count, 'Properties', 'blue') +
        card(pct(t.progress_pct), 'To $20K Target', t.progress_pct > 50 ? 'green' : 'yellow') +
        `<div class="card" style="grid-column:span 4"><div class="lbl">Progress to A$20,000/mo</div><div class="progress-bar"><div class="progress-fill" style="width:${t.progress_pct}%"></div></div><div class="lbl" style="margin-top:4px">A$${audNet.toLocaleString()} of A$20,000 (${pct(t.progress_pct)})</div></div>`;

      let rows = '';
      portfolio.properties.forEach(p => {
        const statusColor = p.status === 'LEASED' ? 'green' : 'red';
        rows += `<tr><td>${p.address}</td><td><span class="${statusColor}">${p.status}</span></td><td>${fmt(p.rent_gross)}</td><td>${fmt(p.rent_net)}</td><td>${p.pm}</td><td style="color:#888;font-size:0.8rem">${p.notes || ''}</td></tr>`;
      });
      document.getElementById('property-rows').innerHTML = rows;
    }

    // HAP
    if (hap) {
      const months = Object.keys(hap).sort().reverse();
      const current = months[0];
      document.getElementById('hap-month').textContent = current;
      const data = hap[current];
      let rows = '';
      Object.values(data).forEach(h => {
        const statusColor = h.status === 'RECEIVED' ? 'green' : h.status === 'EVERNEST_TRANSITION' ? 'yellow' : 'red';
        rows += `<tr><td>${h.property}</td><td>${fmt(h.expected)}</td><td>${h.received ? fmt(h.received) : '—'}</td><td><span class="badge badge-${statusColor === 'green' ? 'green' : statusColor === 'yellow' ? 'yellow' : 'red'}">${h.status}</span></td></tr>`;
      });
      document.getElementById('hap-rows').innerHTML = rows;
    }

    // HEALTH
    if (health) {
      const s = health.spoons;
      const score = Math.round(s.score);
      document.getElementById('spoons-num').textContent = score;
      document.getElementById('spoons-num').className = `num ${s.color === 'green' ? 'green' : s.color === 'yellow' ? 'yellow' : 'red'}`;
      const badgeClass = s.color === 'green' ? 'badge-green' : s.color === 'yellow' ? 'badge-yellow' : 'badge-red';
      document.getElementById('spoons-badge').className = `badge ${badgeClass}`;
      document.getElementById('spoons-badge').textContent = health.stale ? 'STALE DATA' : (score >= 8 ? 'GOOD' : score >= 5 ? 'OK' : 'LOW');

      let spoonsHtml = '';
      for (let i = 1; i <= 12; i++) {
        spoonsHtml += `<div class="spoon ${i <= score ? 'filled' : ''}"></div>`;
      }
      document.getElementById('spoons-bar').innerHTML = spoonsHtml;

      const t = health.today || {};
      const metric = (val, unit, label) => `<div class="metric"><div class="val ${val == null ? 'red' : 'white'}">${val != null ? val : '—'}</div><div class="unit">${unit}</div><div class="label">${label}</div></div>`;

      document.getElementById('health-today').innerHTML =
        metric(t.steps?.toLocaleString(), 'steps', 'Steps') +
        metric(t.resting_hr, 'bpm', 'Resting HR') +
        metric(t.hrv_avg, 'ms', 'HRV') +
        metric(t.active_energy_kcal, 'kcal', 'Active Energy') +
        metric(t.exercise_min, 'min', 'Exercise') +
        metric(t.spo2_avg, '%', 'SpO2') +
        metric(t.sleep_total_hr != null ? t.sleep_total_hr.toFixed(1) : null, 'hrs', 'Sleep') +
        metric(t.stand_hours, 'hrs', 'Stand Hours');

      const w = health.weekly_avg || {};
      document.getElementById('health-weekly').innerHTML =
        metric(w.steps?.toLocaleString(), 'steps', 'Avg Steps') +
        metric(w.sleep_hr?.toFixed(1), 'hrs', 'Avg Sleep') +
        metric(w.hrv, 'ms', 'Avg HRV') +
        metric(w.resting_hr, 'bpm', 'Avg RHR');

      document.getElementById('health-nutrition').innerHTML =
        metric(t.protein_g, 'g', 'Protein') +
        metric(t.carbs_g, 'g', 'Carbs') +
        metric(t.fat_g, 'g', 'Fat') +
        metric(t.dietary_kcal, 'kcal', 'Calories');
    }

    // SYSTEM
    if (system) {
      document.getElementById('system-cards').innerHTML =
        card(system.agents_total, 'LaunchAgents', 'white') +
        card(system.agents_errored, 'Errored', system.agents_errored > 0 ? 'red' : 'green') +
        card(system.disk_free, 'Disk Free', 'green') +
        card(system.telegram_online ? 'ONLINE' : 'OFFLINE', 'Telegram', system.telegram_online ? 'green' : 'red');

      document.getElementById('system-info').innerHTML =
        `<strong>Architecture:</strong> Interactive Garry (terminal) + Telegram Garry (phone) + Background monitoring (Ollama, free)<br>` +
        `<strong>Self-healing:</strong> Roger QA runs every 15 min → writes CORRECTIONS.md → Garry reads at session start<br>` +
        `<strong>Reference:</strong> Iris playbook at ~/AI/Claude/Infrastructure/luke-playbook/<br>` +
        `<strong>Data refresh:</strong> Every 30 minutes via garry-dashboards LaunchAgent<br>` +
        `<strong>Mac Mini:</strong> M4 Pro, 48GB RAM, ${system.disk_used_pct}% disk used`;
    }

  } catch(e) {
    console.error('Dashboard load error:', e);
  }
}

loadAll();
// Auto-refresh data every 5 minutes
setInterval(loadAll, 300000);
</script>
</body>
</html>
